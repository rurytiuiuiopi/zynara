<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>SM Admin — Secure Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#d4a017;--gold2:#f0c040;--dark:#0a0a0a;
      --card:#111111;--border:#2a2a2a;--text:#ffffff;--text2:#aaaaaa;
    }
    body{
      background:var(--dark);min-height:100vh;display:flex;
      align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;
    }
    .login-wrap{width:100%;max-width:420px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-badge{
      display:inline-block;background:linear-gradient(135deg,#b8860b,var(--gold2));
      color:#000;font-weight:900;font-size:28px;letter-spacing:3px;
      padding:14px 28px;border-radius:16px;margin-bottom:16px;
      box-shadow:0 4px 24px rgba(212,160,23,0.4);
    }
    .brand h1{color:var(--text);font-size:20px;font-weight:700;letter-spacing:1px;}
    .brand p{color:var(--text2);font-size:14px;margin-top:4px;}
    .card{
      background:var(--card);border:1px solid var(--border);
      border-radius:20px;padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,0.6);
    }
    .flash{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:14px;font-weight:500;}
    .flash.error{background:#2d0a0a;color:#ef4444;border:1px solid #7f1d1d;}
    .flash.success{background:#052e16;color:#22c55e;border:1px solid #14532d;}
    .form-group{margin-bottom:20px;}
    .form-group label{
      display:block;color:var(--text2);font-size:13px;font-weight:600;
      letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;
    }
    .input-wrap{position:relative;}
    .form-control{
      width:100%;background:#1a1a1a;border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);font-size:16px;
      padding:14px 48px 14px 16px;outline:none;
      transition:border-color .2s;-webkit-appearance:none;
    }
    .form-control:focus{border-color:var(--gold);}
    .form-control::placeholder{color:#555;}
    .eye-btn{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--text2);cursor:pointer;
      font-size:18px;padding:4px;line-height:1;
    }
    .btn-login{
      width:100%;background:linear-gradient(135deg,#b8860b,var(--gold2));
      color:#000;border:none;border-radius:12px;font-size:17px;
      font-weight:800;letter-spacing:1px;padding:16px;cursor:pointer;
      margin-top:8px;transition:opacity .2s,transform .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-login:active{opacity:.85;transform:scale(.98);}
    .divider{
      text-align:center;color:var(--text2);font-size:12px;
      margin:24px 0 0;padding-top:20px;border-top:1px solid var(--border);
    }
    .secure-note{
      display:flex;align-items:center;justify-content:center;
      gap:6px;color:var(--text2);font-size:12px;margin-top:16px;
    }
    @media(max-width:480px){
      .card{padding:28px 20px;}
      .brand-badge{font-size:24px;padding:12px 22px;}
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-badge">SM</div>
    <h1>SHATTA MOVEMENT</h1>
    <p>Admin Control Panel</p>
  </div>
  <div class="card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" autocomplete="on">
      <input type="hidden" name="_csrf" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <input type="text" name="username" class="form-control" placeholder="admin"
            required autofocus autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" name="password" id="pw" class="form-control"
            placeholder="••••••••••" required autocomplete="current-password"/>
          <button type="button" class="eye-btn" onclick="togglePw()" aria-label="Show password">
            <span id="eye">👁</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">LOGIN TO DASHBOARD</button>
    </form>
    <div class="divider">🔒 Authorised Personnel Only</div>
    <div class="secure-note"><span>🛡️ Secured · Encrypted · Private</span></div>
  </div>
</div>
<script>
function togglePw(){
  var f=document.getElementById('pw');
  var e=document.getElementById('eye');
  if(f.type==='password'){f.type='text';e.textContent='🙈';}
  else{f.type='password';e.textContent='👁';}
}
</script>
</body>
</html>
