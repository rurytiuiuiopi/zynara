{% extends "shatta/base.html" %}
{% block title %}Page Not Found — SHATTA TUESDAY MARKET{% endblock %}
{% block content %}
<section class="error-section">
  <div class="error-content">
    <div class="error-code gold">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-actions">
      <a href="{{ url_for('index') }}" class="btn btn-gold">🏠 Go Home</a>
      <a href="{{ url_for('register') }}" class="btn btn-outline">Register Your Business</a>
    </div>
  </div>
</section>
{% endblock %}
