<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Pink gradient background -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#FF6EB4"/>
      <stop offset="50%"  stop-color="#E91E8C"/>
      <stop offset="100%" stop-color="#9C0052"/>
    </radialGradient>

    <!-- Gold shimmer for letters -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF5CC"/>
      <stop offset="40%"  stop-color="#F5D060"/>
      <stop offset="100%" stop-color="#C8960C"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.35)"/>
    </filter>

    <!-- Inner shine on badge -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <clipPath id="roundClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- App icon rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Top-left sparkle cluster -->
  <circle cx="100" cy="100" r="6"  fill="rgba(255,255,255,0.5)"/>
  <circle cx="120" cy="88"  r="3"  fill="rgba(255,255,255,0.35)"/>
  <circle cx="88"  cy="120" r="2"  fill="rgba(255,255,255,0.3)"/>

  <!-- Bottom-right sparkle cluster -->
  <circle cx="412" cy="412" r="6"  fill="rgba(255,255,255,0.4)"/>
  <circle cx="430" cy="398" r="3"  fill="rgba(255,255,255,0.25)"/>
  <circle cx="398" cy="430" r="2"  fill="rgba(255,255,255,0.2)"/>

  <!-- Gold star accents -->
  <text x="72"  y="320" font-size="22" fill="rgba(245,208,96,0.6)" font-family="serif">✦</text>
  <text x="418" y="210" font-size="18" fill="rgba(245,208,96,0.5)" font-family="serif">✦</text>
  <text x="130" y="430" font-size="14" fill="rgba(245,208,96,0.4)" font-family="serif">✦</text>

  <!-- Inner shine overlay (top half) -->
  <ellipse cx="256" cy="150" rx="190" ry="120"
           fill="url(#shineGrad)" clip-path="url(#roundClip)"/>

  <!-- "TM" main lettering -->
  <text x="256" y="305"
        font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="210"
        letter-spacing="-8"
        text-anchor="middle"
        fill="url(#textGrad)"
        filter="url(#glow)">TM</text>

  <!-- Thin gold rule under letters -->
  <rect x="96" y="318" width="320" height="3" rx="2"
        fill="url(#textGrad)" opacity="0.75"/>

  <!-- Sub-label -->
  <text x="256" y="362"
        font-family="'Montserrat', 'Arial', sans-serif"
        font-weight="700"
        font-size="28"
        letter-spacing="10"
        text-anchor="middle"
        fill="rgba(255,255,255,0.85)">TUESDAY MARKET</text>

  <!-- Bottom tagline -->
  <text x="256" y="400"
        font-family="'Inter', 'Arial', sans-serif"
        font-weight="400"
        font-size="18"
        letter-spacing="2"
        text-anchor="middle"
        fill="rgba(255,255,255,0.55)">Promoting Ghanaian Businesses</text>

  <!-- Subtle border shine -->
  <rect x="2" y="2" width="508" height="508" rx="111" ry="111"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
</svg>
